name: CI

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install Node dependencies
        run: npm ci

      - name: Validate environment parity (.site-requirements.json)
        run: |
          REQ_PHP=$(jq -r '.php' .site-requirements.json)
          REQ_NODE=$(jq -r '.node' .site-requirements.json)
          ACTUAL_PHP=$(php -r "echo PHP_MAJOR_VERSION.'.'.PHP_MINOR_VERSION;")
          ACTUAL_NODE=$(node -e "process.stdout.write(process.versions.node.split('.')[0])")
          echo "Required: PHP=$REQ_PHP Node=$REQ_NODE"
          echo "Actual:   PHP=$ACTUAL_PHP Node=$ACTUAL_NODE"
          [ "$ACTUAL_PHP" = "$REQ_PHP" ] || { echo "::error::PHP mismatch (need $REQ_PHP, got $ACTUAL_PHP)"; exit 1; }
          [ "$ACTUAL_NODE" = "$REQ_NODE" ] || { echo "::error::Node mismatch (need $REQ_NODE, got $ACTUAL_NODE)"; exit 1; }
          echo "✓ Environment matches .site-requirements.json"

      - name: Build (bundle size check runs inside Vite)
        run: npm run build

      - name: PHPStan
        run: composer analyse

      - name: Pest (PHP unit tests)
        run: composer test:php

      - name: Jest
        run: npm test

      - name: Pattern allowlist
        run: npm run check:patterns
