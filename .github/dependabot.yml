version: 2

updates:
  - package-ecosystem: 'composer'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '16:00'
      timezone: 'Europe/Tallinn'
    open-pull-requests-limit: 5
    groups:
      composer:
        update-types: ['minor', 'patch']

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '16:15'
      timezone: 'Europe/Tallinn'
    open-pull-requests-limit: 5
    groups:
      npm:
        update-types: ['minor', 'patch']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '16:30'
      timezone: 'Europe/Tallinn'
    open-pull-requests-limit: 5
